name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  verify-version:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        id: version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(python3 -c "import tomllib; print(tomllib.load(open('src-tauri/Cargo.toml', 'rb'))['package']['version'])")
          CONF_VER=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          if [ "$TAG_VER" != "$CARGO_VER" ] || [ "$TAG_VER" != "$CONF_VER" ]; then
            echo "::error::Version mismatch: tag=$TAG_VER cargo=$CARGO_VER conf=$CONF_VER"
            exit 1
          fi
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          echo "Version OK: $TAG_VER"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists"
          else
            NOTES=$(printf '%s\n' \
              "- macOS: if you see 'unidentified developer', right-click the app and select Open." \
              "- Linux (AppImage): download the .AppImage asset, run chmod +x on it, then launch it." \
              "- Linux (deb/AUR): Omarchy and Arch users should prefer the packaged install path when available." \
              "- Arch/Omarchy: if AppImage mounting fails, install fuse2 or run with --appimage-extract-and-run.")
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "notes v${{ steps.version.outputs.version }}" \
              --draft \
              --notes "$NOTES"
          fi

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      updater_bundle: ${{ steps.bundle_meta.outputs.updater_bundle }}
      updater_signature: ${{ steps.bundle_meta.outputs.updater_signature }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli@2

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build --target aarch64-apple-darwin

      - name: Locate bundle
        id: bundle
        run: |
          BUNDLE_DIR="target/aarch64-apple-darwin/release/bundle"
          APP=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in $BUNDLE_DIR/macos"
            ls -laR "$BUNDLE_DIR" || true
            exit 1
          fi
          echo "dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep -s - "${{ steps.bundle.outputs.app }}"
          codesign --verify --deep --strict "${{ steps.bundle.outputs.app }}"
          echo "Signature OK"

      - name: Repackage updater tarball with signed app
        run: |
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          APP_NAME=$(basename "${{ steps.bundle.outputs.app }}")
          TAR=$(find "$DIR" -maxdepth 1 -name "*.app.tar.gz" | head -1)
          TAR_BASE=$(basename "$TAR")
          (cd "$DIR" && rm -f "$TAR_BASE" && tar czf "$TAR_BASE" "$APP_NAME")
          echo "Repackaged: $TAR_BASE"

      - name: Re-sign updater tarball
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          TAR=$(find "$DIR" -maxdepth 1 -name "*.app.tar.gz" | head -1)
          rm -f "${TAR}.sig"
          tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$TAR"
          echo "Signed: ${TAR}.sig"

      - name: Rebuild DMG with signed app
        run: |
          DIR="${{ steps.bundle.outputs.dir }}"
          APP="${{ steps.bundle.outputs.app }}"
          DMG=$(find "$DIR/dmg" -maxdepth 1 -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            DMG_NAME=$(basename "$DMG")
            APP_NAME=$(basename "$APP")
            rm -f "$DMG"
            hdiutil create -volname "$APP_NAME" -srcfolder "$APP" \
              -ov -format UDZO "$DIR/dmg/$DMG_NAME"
            echo "Rebuilt DMG: $DMG_NAME"
          fi

      - name: Capture updater metadata
        id: bundle_meta
        run: |
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          TAR=$(find "$DIR" -maxdepth 1 -name "*.app.tar.gz" | head -1)
          SIG_FILE="${TAR}.sig"
          {
            echo "updater_bundle=$(basename "$TAR")"
            echo "updater_signature<<EOF"
            cat "$SIG_FILE"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIR="${{ steps.bundle.outputs.dir }}"
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"

          for f in "$DIR"/dmg/*.dmg "$DIR"/macos/*.app.tar.gz "$DIR"/macos/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              echo "Uploading: $(basename "$f")"
              gh release upload "$TAG" "$f" --repo "$REPO" --clobber
            fi
          done

  build-linux:
    needs: verify-version
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      updater_bundle: ${{ steps.bundle_meta.outputs.updater_bundle }}
      updater_signature: ${{ steps.bundle_meta.outputs.updater_signature }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli@2

      - name: Build Linux bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build --bundles appimage,deb

      - name: Normalize Debian bundle name
        run: |
          DIR="target/release/bundle/deb"
          shopt -s nullglob
          DEBS=("$DIR"/*.deb)
          if [ "${#DEBS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one deb bundle in $DIR"
            ls -laR "$DIR" || true
            exit 1
          fi
          EXPECTED="$DIR/notes_${{ needs.verify-version.outputs.version }}_amd64.deb"
          if [ "${DEBS[0]}" != "$EXPECTED" ]; then
            mv "${DEBS[0]}" "$EXPECTED"
          fi

      - name: Normalize AppImage bundle name
        run: |
          DIR="target/release/bundle/appimage"
          shopt -s nullglob
          APPS=("$DIR"/*.AppImage)
          SIGS=("$DIR"/*.AppImage.sig)
          if [ "${#APPS[@]}" -ne 1 ] || [ "${#SIGS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one AppImage and signature in $DIR"
            ls -laR "$DIR" || true
            exit 1
          fi
          EXPECTED_APP="$DIR/notes_${{ needs.verify-version.outputs.version }}_amd64.AppImage"
          EXPECTED_SIG="${EXPECTED_APP}.sig"
          if [ "${APPS[0]}" != "$EXPECTED_APP" ]; then
            mv "${APPS[0]}" "$EXPECTED_APP"
          fi
          if [ "${SIGS[0]}" != "$EXPECTED_SIG" ]; then
            mv "${SIGS[0]}" "$EXPECTED_SIG"
          fi

      - name: Capture updater metadata
        id: bundle_meta
        run: |
          DIR="target/release/bundle/appimage"
          APP="$DIR/notes_${{ needs.verify-version.outputs.version }}_amd64.AppImage"
          SIG_FILE="${APP}.sig"
          if [ ! -f "$APP" ] || [ ! -f "$SIG_FILE" ]; then
            echo "::error::Missing normalized AppImage or signature in $DIR"
            ls -laR "$DIR" || true
            exit 1
          fi
          {
            echo "updater_bundle=$(basename "$APP")"
            echo "updater_signature<<EOF"
            cat "$SIG_FILE"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIR="target/release/bundle/appimage"
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"

          for f in "$DIR"/*.AppImage "$DIR"/*.AppImage.sig target/release/bundle/deb/*.deb; do
            if [ -f "$f" ]; then
              echo "Uploading: $(basename "$f")"
              gh release upload "$TAG" "$f" --repo "$REPO" --clobber
            fi
          done

  upload-latest-json:
    needs:
      - verify-version
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        run: |
          export NOW
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - <<'PY'
          import json
          import os

          data = {
              "version": os.environ["VER"],
              "pub_date": os.environ["NOW"],
              "platforms": {
                  "darwin-aarch64": {
                      "url": f"{os.environ['BASE']}/{os.environ['MAC_BUNDLE']}",
                      "signature": os.environ["MAC_SIG"],
                  },
                  "linux-x86_64": {
                      "url": f"{os.environ['BASE']}/{os.environ['LINUX_BUNDLE']}",
                      "signature": os.environ["LINUX_SIG"],
                  },
              },
          }

          with open("/tmp/latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PY
        env:
          VER: ${{ needs.verify-version.outputs.version }}
          BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          MAC_BUNDLE: ${{ needs.build-macos.outputs.updater_bundle }}
          MAC_SIG: ${{ needs.build-macos.outputs.updater_signature }}
          LINUX_BUNDLE: ${{ needs.build-linux.outputs.updater_bundle }}
          LINUX_SIG: ${{ needs.build-linux.outputs.updater_signature }}

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" /tmp/latest.json --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
