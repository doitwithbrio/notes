name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli@latest

      - name: Verify version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CONF_VER=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          if [ "$TAG_VER" != "$CARGO_VER" ] || [ "$TAG_VER" != "$CONF_VER" ]; then
            echo "::error::Version mismatch: tag=$TAG_VER cargo=$CARGO_VER conf=$CONF_VER"
            exit 1
          fi
          echo "Version OK: $TAG_VER"

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: tauri build --target aarch64-apple-darwin

      - name: Locate bundle
        id: bundle
        run: |
          BUNDLE_DIR="target/aarch64-apple-darwin/release/bundle"
          APP=$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in $BUNDLE_DIR/macos"
            ls -laR "$BUNDLE_DIR" || true
            exit 1
          fi
          echo "dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep -s - "${{ steps.bundle.outputs.app }}"
          codesign --verify --deep --strict "${{ steps.bundle.outputs.app }}"
          echo "Signature OK"

      - name: Repackage updater tarball with signed app
        run: |
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          APP_NAME=$(basename "${{ steps.bundle.outputs.app }}")
          TAR=$(find "$DIR" -name "*.app.tar.gz" -maxdepth 1 | head -1)
          TAR_BASE=$(basename "$TAR")
          (cd "$DIR" && rm -f "$TAR_BASE" && tar czf "$TAR_BASE" "$APP_NAME")
          echo "Repackaged: $TAR_BASE"

      - name: Re-sign updater tarball
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          TAR=$(find "$DIR" -name "*.app.tar.gz" -maxdepth 1 | head -1)
          rm -f "${TAR}.sig"
          tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$TAR"
          echo "Signed: ${TAR}.sig"

      - name: Rebuild DMG with signed app
        run: |
          DIR="${{ steps.bundle.outputs.dir }}"
          APP="${{ steps.bundle.outputs.app }}"
          DMG=$(find "$DIR/dmg" -name "*.dmg" -maxdepth 1 | head -1)
          if [ -n "$DMG" ]; then
            DMG_NAME=$(basename "$DMG")
            APP_NAME=$(basename "$APP")
            rm -f "$DMG"
            hdiutil create -volname "$APP_NAME" -srcfolder "$APP" \
              -ov -format UDZO "$DIR/dmg/$DMG_NAME"
            echo "Rebuilt DMG: $DMG_NAME"
          fi

      - name: Get app version
        id: version
        run: |
          VER=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "notes v${{ steps.version.outputs.version }}" \
            --notes '**macOS:** If you see "unidentified developer", right-click the app and select Open.' \
            2>/dev/null || true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIR="${{ steps.bundle.outputs.dir }}"
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"

          for f in "$DIR"/dmg/*.dmg "$DIR"/macos/*.app.tar.gz "$DIR"/macos/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              echo "Uploading: $(basename "$f")"
              gh release upload "$TAG" "$f" --repo "$REPO" --clobber
            fi
          done

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"
          VER="${TAG#v}"
          DIR="${{ steps.bundle.outputs.dir }}/macos"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          TAR_NAME=$(basename "$(find "$DIR" -name "*.app.tar.gz" -maxdepth 1 | head -1)")
          SIG_FILE=$(find "$DIR" -name "*.app.tar.gz.sig" -maxdepth 1 | head -1)
          SIG=$(cat "$SIG_FILE")

          python3 -c "
          import json, sys
          data = {
              'version': sys.argv[1],
              'pub_date': sys.argv[2],
              'platforms': {
                  'darwin-aarch64': {
                      'url': sys.argv[3] + '/' + sys.argv[4],
                      'signature': sys.argv[5]
                  }
              }
          }
          with open('/tmp/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          " "$VER" "$NOW" "$BASE" "$TAR_NAME" "$SIG"

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
