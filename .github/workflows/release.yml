name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.target }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Verify version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CONF_VER=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          if [ "$TAG_VER" != "$CARGO_VER" ] || [ "$TAG_VER" != "$CONF_VER" ]; then
            echo "::error::Version mismatch: tag=$TAG_VER cargo=$CARGO_VER conf=$CONF_VER"
            exit 1
          fi
          echo "Version OK: $TAG_VER"

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Ad-hoc codesign
        run: |
          APP=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          codesign --force --deep -s - "$APP"
          codesign --verify --deep --strict "$APP"
          echo "Signed: $APP"

      - name: Repackage updater tarball with signed app
        run: |
          DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP=$(basename "$(find "$DIR" -name "*.app" -maxdepth 1 | head -1)")
          TAR=$(basename "$(find "$DIR" -name "*.app.tar.gz" -maxdepth 1 | head -1)")
          (cd "$DIR" && rm -f "$TAR" && tar czf "$TAR" "$APP")
          echo "Repackaged: $TAR"

      - name: Sign updater tarball
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          TAR=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app.tar.gz" | head -1)
          rm -f "${TAR}.sig"
          cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" "$TAR"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "notes ${GITHUB_REF_NAME}" \
            --notes '**macOS:** If you see "unidentified developer", right-click the app and select Open.' \
            --draft 2>/dev/null || true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"

          for f in "$DIR"/dmg/*.dmg "$DIR"/macos/*.app.tar.gz "$DIR"/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done

  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"
          VER="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download the .sig files from the release to read their contents
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs 2>/dev/null || true

          AARCH64_SIG=""
          X64_SIG=""
          [ -f /tmp/sigs/notes_aarch64.app.tar.gz.sig ] && AARCH64_SIG=$(cat /tmp/sigs/notes_aarch64.app.tar.gz.sig)
          [ -f /tmp/sigs/notes_x64.app.tar.gz.sig ] && X64_SIG=$(cat /tmp/sigs/notes_x64.app.tar.gz.sig)

          cat > /tmp/latest.json << EOF
          {
            "version": "${VER}",
            "pub_date": "${NOW}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/notes_aarch64.app.tar.gz",
                "signature": "${AARCH64_SIG}"
              },
              "darwin-x86_64": {
                "url": "${BASE}/notes_x64.app.tar.gz",
                "signature": "${X64_SIG}"
              }
            }
          }
          EOF

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
